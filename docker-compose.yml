version: '3.1'
services:
 
  backend:
    restart: always
    container_name: dailymon
    image: dailymon:latest
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb_container://mariadb_container:3306/dailymondb
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=BrieucGorin
    networks:
      - web
    # PORTS RETIRÉS - accès via reverse proxy uniquement
    volumes:
      - ${CERTBOT_CONF_LETSENCRYPT}:ro
      
  frontend:
    restart: always
    container_name: dailyvue
    image: dailyvue:latest
    networks:
      - web
    # PORTS RETIRÉS - accès via reverse proxy uniquement
    volumes:
      - ${CERTBOT_WWW}:ro
      - ${CERTBOT_CONF_NGINX}:ro
    depends_on:
      - backend

networks:
  web:
    external: true  # Utilise le réseau externe partagé